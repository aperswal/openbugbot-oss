version: 2

builds:
  - id: openbugbot
    main: ./cmd/openbugbot
    binary: openbugbot
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  use: github-native
